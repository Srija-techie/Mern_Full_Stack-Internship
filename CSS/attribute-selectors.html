<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute-selectors</title>
    <style>
        img[alt^='ima']{
            height: 350px;
            width:400px;
            border-radius: 50px;
        }
        h1[id$='ag']{
            color: darkseagreen;
        }
        h1[id|='heading']{
            color:darkorange;
            background-color:rgb(241, 237, 167);
        }
        h1[id*='t']{
            color: crimson;
        }
    </style>
</head>
<body>
   <h1 id="heading">headings</h1>
   <h1 id="heading-tag">headings</h1>
   <h1 id="heading tag">headings</h1>
