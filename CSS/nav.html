<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            background-image: linear-gradient(rgba(228, 4, 228, 0.772),violet,pink);
        }
        ol{
            padding: 20px;
            display: flex;
            justify-content: space-evenly;
            list-style: none;
        }
        li{
            background-color:indianred;
            color: bisque;
            padding: 10px 20px;
        }
        /* small devices designing */
        @media screen and (max-width:450px){
            ol{
                flex-direction: column;
            }
            li{
                margin: 10px;
                text-align: center;
            }
        }
        /* ipads */
        @media screen and (min-width:450px) and (max-width:850px){
            nav{
                background-image: linear-gradient(pink,lavenderblush);
            }
        }
    </style>
</head>
<body>
    <nav>
        <ol>
            <li>HOME</li>
            <li>ABOUT</li>
            <li>HELP</li>
            <li>CONTACT</li>
            <li>LOGIN</li>
        </ol>
    </nav>

</body>
</html>
