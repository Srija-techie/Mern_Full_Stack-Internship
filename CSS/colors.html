<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colours</title>
    <style>
        /*color values*/
        li:first-child{
            color:brown;
            background-color:beige;
        }
        li:nth-child(2){
            color:rgb(0,255,255);
            background-color: rgb(100,10,29);
        }
        li:nth-child(3){
            border: 10px solid rgba(235,89,150,0.7);
            background-color: rgba(150,0,150,0.2);
        }
        li:nth-child(4){
            background-color: hsl(0, 52%, 76%);
        }
        li:nth-child(5){
            color: rgb(100, 53, 112);
            background-color: hsla(180, 90%, 70%, 0.5);
        }
        li:nth-child(6){
            background-color: #63bffbc6;
        }
        h1{
            color: transparent;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Color Values</h1>
    <ol>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
    </ol>
</body>
</html>
