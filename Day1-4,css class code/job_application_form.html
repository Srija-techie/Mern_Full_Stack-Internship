<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200vh;
            width: 100vw;
            background-image: url(https://png.pngtree.com/thumb_back/fh260/background/20231010/pngtree-lavender-hues-a-delicate-and-dreamy-texture-image_13576610.png);
            background-repeat: no-repeat;
            background-size: cover;
        }
        fieldset{
            border: none;
            backdrop-filter: blur(2px);
            margin: 20px;
            padding: 30px;
            border-radius: 10x 30px;
            box-shadow: 10px 10px 5px rgb(203, 116, 221);
        }
        label{
            color: white;
            font-size: larger;
            font-family: monospace;
            font-style: italic;
            font-weight: bold;
            }
        button{
            padding: 10px 30px;
            background-color: rgb(179, 106, 247);
            font-weight: bold;
            font-style: italic;
            font-family: monospace;
            border-radius: 10px;
        }
        h1{
            text-align: center;
            color: rgb(167, 90, 240);
            background-image: linear-gradient(goldenrod,lavenderblush);
            background-clip: text;
            font-size: 50px;
        }
    </style>
</head>
<body> 
    <form action="" method="post">
        <fieldset>
            <h2>Job Application Form</h2>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" maxlength="7" minlength="4" placeholder="Enter first name">
            <br><br>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" required placeholder="Enter last name" maxlength="10" minlength="5">
            <br>
            <br>
            <label for="ml">Email:</label>
            <input type="email" id="ml" required placeholder="Enter your valid email id">
            <br>
            <br>
            <label for="dob">Date of Birth:</label>
            <input type="date"  id="dob">
            <br>
            <br>
             <label for="phno">Phone number:</label>
            <input type="tel" pattern="[6-9]{1}[0-9]{9}" id="phno" required placeholder="Enter phone number" maxlength="10" minlength="5">
            <br>
            <br>
             <label for="">State:</label>
             <select><option value="Andhra Pradesh">Andhra Pradesh</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Kerala">Kerala</option>
                <option value="Delhi">Delhi</option>
            </select>
            <br>
            <br>
            <label for="address">Address: </label>
            <textarea name="address" rows="3" cols="30" id="address" placeholder="Enter full address"></textarea>
            <br>
            <br>
            <label for="">Gender:</label>
            <input type="radio" name="Gender">Male
            <input type="radio" name="Gender">Female
            <input type="radio" name="Gender">Others
            <br>
            <br>
            <label for="skills">Skills:</label>
            <input type="checkbox">NodeJS
            <input type="checkbox">CI/CD
            <input type="checkbox">git
            <input type="checkbox">Express Js
            <input type="checkbox">MongoDB
            <br>
            <br>
            <label for="language">Languages:</label>
            <input type="range">English<br>
            <input type="range">Kannada<br>
            <input type="range">Telugu<br>
            <input type="range">Hindi<br>
            <br>
            <br>
            <label for="resume">Resume: </label>
            <input type="file" >
            <br>
            <br>
            <button type="submit">submit</button>
            <button type="cancel">cancel</button>
        </fieldset>
    </form>
</body>
</html>
