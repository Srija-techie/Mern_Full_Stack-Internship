<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other tags</title>
</head>
<body>
    <marquee behaviour="" direction=""
    bgcolor="lavender" height="250" width="700" loop="2">
        <h1>HELLO EVERYONE</h1>
        <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/08/ed/c4/fe/sunset-beach.jpg?w=1200&h=-1&s=1" alt="" height="150" width="250">
    </marquee>
    <marquee behaviour="" direction="right" scrollamount="30"
    bgcolor="beige">
        <h1>Along with scrollamount and direction</h1>
        <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/08/ed/c4/fe/sunset-beach.jpg?w=1200&h=-1&s=1" alt="" height="150" width="250">
    </marquee>
    <marquee behaviour="slide" direction="up"
    bgcolor="mage">
        <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/08/ed/c4/fe/sunset-beach.jpg?w=1200&h=-1&s=1" alt="" height="100" width="100">
    </marquee>
</marquee>
<br>
<br>
    <hr>
    <h1>Image tag with absolute path</h1>
    <img src="https://images.stockcake.com/public/f/9/7/f9746331-150a-45a9-8cce-35223c1411ca_large/sunset-beach-waves-stockcake.jpg" alt="beach image">
    <br>
    <br>
    <hr>
    <h1>Image tag with height and width attributes</h1>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQsB-oJ_KJINpx5HVmbxt3-Fy1_JEP12IXPGw&s" alt="sunrise image" height="200",width="450px" >
    <br>
    <br>
    <hr>
    <h1>Image tag with style attributes</h1>
    <center>
    <img src="https://img.freepik.com/premium-photo/landscape-beach-sunset-with-beautiful-cloud-colorful-sunsets_1144977-288.jpg?w=360" alt="beach sunrise" height="300" width="350" style="border-radius:100px ;box-shadow: 10px 10px 20px rgb(203, 117, 225); border: 10px solid violet; padding: 20px">
    </center>
    <br>
    <hr>
    <h1>Image with relative path</h1>
    <hr>
    <img src="./image.webp" alt="" height="500" width="700">
</body>
</html>
