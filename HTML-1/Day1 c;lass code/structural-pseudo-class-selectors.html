        button:first-of-type{

        button:nth-child(4){

        }
        li:nth-child(even){

        li:nth-child(odd){
            background-color: rgb(151, 10, 207);
        }
        li:nth-child(2),li:nth-child(3){
            border-radius: 56ppx;
            font-size: 50px;
            margin:20px;
            background-color: burlywood;
            text-decoration: wavy;
            text-shadow: 5px 5px solid black;
        }
        a:visited{

        }
        a:active{
            color:brown;
            font-size: 20px;
        }
        input:focus{
            background-color: darkgoldenrod;
            color: blueviolet;
            font-style: italic;
            font-family: monospace;
            font-weight: 200;
            font-size: 20px;
            height: 100px;
            width: 200px;
        }
        div{
            height: 150px;
            width: 150px;
            color:forestgreen;
        }
        div:hover{
            background-color: rgb(240, 150, 14);
        }
        a:hover{
            font-style: italic;
            text-decoration: underline double 5px;
        }
