<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <form action="https://onlinesbi.sbi.bank.in/" method="post">
            <fieldset style="background-image: linear-gradient(lavenderblush,palevioletred,rgb(185, 112, 38));";height: 200px; border-radius: 40px 50px;padding: 50px;margin: 20px;>
              <legend align="center"><h2>LOGIN FORM</h2></legend>
              <label for="Username">Username:</label>
              <input type="text" maxlength="7" minlength="5" required name="Username" id="Username" placeholder="Enter Username">
              <br><br>
              <label for="Password">Password:</label>
              <input type="text"  required name="Password" id="Password" placeholder="Enter Password">
              <br><br>
              <button type="submit">Login</button>
              <button type="reset">Cancel</button>
            </fieldset>
        </form>
</body>
</html>
