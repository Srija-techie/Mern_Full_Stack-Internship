<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, 
                #ff9a9e, 
                #fad0c4, 
                #fbc2eb, 
                #a6c1ee, 
                #84fab0
            );
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        form {
            width: 320px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #ff4d6d;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input:focus {
            border-color: #6c63ff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: linear-gradient(to right, #ff4d6d, #6c63ff);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            form {
                width: 90%;
                padding: 15px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <form>
        <h2>Login</h2>

        <label>Username</label>
        <input type="text" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <button>Login</button>
    </form>

</body>
</html>
