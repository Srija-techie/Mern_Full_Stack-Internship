<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    form {
        background: linear-gradient(135deg, #1e293b, #334155);
        padding: 30px 40px;
        border-radius: 18px;
        width: 340px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        color: #e2e8f0;
        text-align: center;
    }

    h2 {
        margin-bottom: 15px;
        color: #cbd5f5;
        letter-spacing: 0.5px;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 12px;
        font-size: 14px;
        color: #cbd5e1;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: 1px solid #475569;
        outline: none;
        background: rgba(255,255,255,0.05);
        color: #f1f5f9;
        transition: 0.3s;
    }

    input::placeholder {
        color: #94a3b8;
    }

    input:focus {
        border-color: #818cf8;
        box-shadow: 0 0 8px rgba(129,140,248,0.5);
        background: rgba(255,255,255,0.08);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        color: white;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
        transform: translateY(-2px);
    }
</style>
</head>
<body>

<form id="loginForm">
    <h2>Login</h2>

    <label>Username:</label>
    <input type="text" id="loginUser" placeholder="Enter username">

    <br><br>

    <label>Password:</label>
    <input type="password" id="loginPwd" placeholder="Enter password">

    <br><br>

    <button type="submit">Login</button>
</form>
<script>document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let enteredUser = document.getElementById("loginUser").value.trim();
    let enteredPwd = document.getElementById("loginPwd").value.trim();

    // get stored data
    let storedUser = localStorage.getItem("username");
    let storedPwd = localStorage.getItem("pwd");

    if (enteredUser === "" || enteredPwd === "") {
        alert("All fields are required");
        return;
    }

    // check match
    if (enteredUser === storedUser && enteredPwd === storedPwd) {
        alert("Login Successful");

        // redirect to home page
        window.location.href = "home.html";
    } else {
        alert("Invalid Username or Password");
    }
});
</script>

</body>
</html>
