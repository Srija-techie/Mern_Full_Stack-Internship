<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <h1 align="center">LOGIN FORM</h1>
            <label for="">Username:</label>
            <input type="text" id="username"  placeholder="enter username"><br><br>
            <label for="">Password:</label>
            <input type="password" id="password"  placeholder="enter password"><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
    <script>
        let uName=document.getElementById("username");
        let pwd=document.getElementById("password");
        let form=document.querySelector("form");

        form.addEventListener("submit",(e)=>{
            e.preventDefault()
            console.log("Username: ",uName.value);
            console.log("Password: ",pwd.value);
            window.localStorage.setItem("Username",uName.value)
            window.localStorage.setItem("Password",pwd.value)
            //localstorage.setItem() is used to store data in local storage in key value format 
            let storedName=localStorage.getItem("Username")
            let storedPassword=localStorage.getItem("Password")
            console.log("stored username",storedName);
            console.log("stored password",storedPassword);
            
        })

    </script>
</body>
</html>
